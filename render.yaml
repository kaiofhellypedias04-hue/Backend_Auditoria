services:
  - type: web
    name: backend-render-ready
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_DATA_DIR
        value: /tmp/backend_render_ready
      - key: DATA_DIR
        value: /tmp/backend_render_ready/saida
      - key: OUTPUT_DIR
        value: /tmp/backend_render_ready/saida
      - key: TEMP_DIR
        value: /tmp/backend_render_ready/temp
      - key: CERTS_DIR
        value: /tmp/backend_render_ready/certs
      - key: CERTS_JSON_PATH
        value: /tmp/backend_render_ready/certs.json
      - key: CREDENTIALS_JSON_PATH
        value: /tmp/backend_render_ready/credentials.json
      - key: SECRETS_FILE_PATH
        value: /tmp/backend_render_ready/secrets.runtime.json
      - key: ENABLE_KEYRING_FALLBACK
        value: "false"
      - key: PLAYWRIGHT_TIMEOUT_MS
        value: "300000"
